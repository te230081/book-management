<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>管理画面</title>
    <link rel="stylesheet" href="/webjars/bootstrap/5.3.0/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">書籍管理システム</span>
            <span class="navbar-text text-white ms-auto">
                <!-- ログインしているユーザーの名前を自動で表示します -->
                ユーザー: <span sec:authentication="name"></span>
            </span>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="alert alert-warning" role="alert">
            <h4>管理者専用ページ</h4>
            <p>このページは管理ユーザーのみがアクセスできます。</p>
        </div>

        <div class="card">
            <div class="card-header bg-danger text-white">
                <h5 class="mb-0">管理機能</h5>
            </div>
            <div class="card-body">
                <ul class="list-group">
                    <li class="list-group-item">
                        <a href="#">ユーザー管理</a>
                    </li>
                    <li class="list-group-item">
                        <a href="#">システムログ</a>
                    </li>
                    <li class="list-group-item">
                        <a href="#">システム設定</a>
                    </li>
                </ul>
            </div>
        </div>

        <div class="mt-3">
            <!-- 前の演習で作った書籍一覧画面（/books）に戻るボタン -->
            <a href="/books" class="btn btn-secondary">戻る</a>
        </div>
    </div>
</body>
</html>
